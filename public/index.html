<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Greg</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23111114'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='16' font-family='system-ui' fill='%23a78bfa'%3EG%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <div id="app">
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <span class="logo" aria-hidden="true">G</span>
          <div>
            <div class="brand-name">Greg</div>
            <div class="brand-sub">Grok Build desk</div>
          </div>
          <button
            type="button"
            id="btn-sidebar-close"
            class="btn icon sidebar-close"
            aria-label="Close sidebar"
            title="Close sidebar"
          >
            ✕
          </button>
        </div>

        <button type="button" id="btn-new" class="btn primary block">New session</button>

        <div class="sidebar-section">
          <div class="section-label">Workspace</div>
          <div class="field">
            <label class="sr-only" for="cwd">Workspace path</label>
            <input id="cwd" type="text" spellcheck="false" autocomplete="off" placeholder="/path/to/project" />
          </div>
          <div id="recents-list" class="recents-list" aria-label="Recent workspaces"></div>
          <p class="recents-hint muted small">Projects you open will show up here.</p>
        </div>

        <div class="sidebar-section sessions-section">
          <div class="section-label">Sessions</div>
          <div id="session-list" class="session-list" aria-label="Active sessions" aria-live="polite"></div>
          <p class="session-list-hint muted small">Live multi-tab sessions.</p>
        </div>

        <div class="sidebar-section history-section">
          <div class="section-label">History</div>
          <div id="history-list" class="history-list" aria-label="Saved sessions"></div>
          <p class="history-list-hint muted small">Replay past chats from disk (read-only).</p>
        </div>

        <div class="sidebar-section">
          <div class="section-label">Permissions</div>
          <label class="check">
            <input id="always-approve" type="checkbox" />
            <span>Auto-approve tools</span>
          </label>
        </div>

        <div class="sidebar-meta" id="meta">
          <div class="muted">Starting…</div>
        </div>

        <div class="sidebar-foot muted">
          Local only · ACP · Apache-2.0
        </div>
      </aside>

      <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

      <main class="main">
        <header class="topbar">
          <div class="topbar-left">
            <button
              type="button"
              id="btn-sidebar-open"
              class="btn icon sidebar-open"
              aria-label="Open sidebar"
              title="Menu"
            >
              ☰
            </button>
            <div id="status" class="status idle" role="status">
              <span class="dot" aria-hidden="true"></span>
              <span id="status-text">Idle</span>
            </div>
          </div>
          <div class="topbar-right">
            <div id="session-label" class="session-label muted">No session</div>
            <button type="button" id="btn-stop" class="btn subtle" disabled title="Stop session">
              Stop
            </button>
          </div>
        </header>

        <section id="transcript" class="transcript" aria-live="polite">
          <div class="empty-state" id="empty-state">
            <div class="empty-mark" aria-hidden="true">G</div>
            <p class="empty-title">New session to start</p>
            <p class="empty-sub muted">local ACP desk</p>
          </div>
        </section>

        <footer class="composer">
          <div class="composer-dock">
            <textarea
              id="prompt"
              rows="3"
              placeholder="Message Greg… (Enter send · ⌘/Ctrl+Enter · Ctrl+. cancel · Shift+Enter newline)"
              disabled
            ></textarea>
            <div class="composer-bar">
              <span class="muted small" id="hint">Create a session to start</span>
              <div class="composer-actions">
                <button
                  type="button"
                  id="btn-cancel"
                  class="btn subtle"
                  disabled
                  title="Cancel turn (Ctrl+.)"
                  hidden
                >
                  Cancel
                </button>
                <button type="button" id="btn-send" class="btn primary" disabled>Send</button>
              </div>
            </div>
          </div>
        </footer>
      </main>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
